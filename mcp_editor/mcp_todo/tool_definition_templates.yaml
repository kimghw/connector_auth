      is_required: false
      is_optional: true
      has_default: true
      default: null
    - name: list_id_or_name
      type: str
      is_required: false
      is_optional: true
      has_default: true
      default: null
    - name: task_id
      type: str
      is_required: true
      is_optional: false
      has_default: false
      default: null
    - name: title
      type: str
      is_required: false
      is_optional: true
      has_default: true
      default: null
    - name: body
      type: str
      is_required: false
      is_optional: true
      has_default: true
      default: null
    - name: importance
      type: str
      is_required: false
      is_optional: true
      has_default: true
      default: null
    - name: status
      type: str
      is_required: false
      is_optional: true
      has_default: true
      default: null
    - name: due_datetime
      type: str
      is_required: false
      is_optional: true
      has_default: true
      default: null
    - name: reminder_datetime
      type: str
      is_required: false
      is_optional: true
      has_default: true
      default: null
    - name: categories
      type: List[str]
      is_required: false
      is_optional: true
      has_default: true
      default: null
    signature: 'user_email: Optional[str] = None, list_id_or_name: Optional[str] = None, task_id: str = "", title: Optional[str] = None, body: Optional[str] = None, importance: Optional[str] = None, status: Optional[str] = None, due_datetime: Optional[str] = None, reminder_datetime: Optional[str] = None, categories: Optional[List[str]] = None'
  mcp_service_factors: {}

