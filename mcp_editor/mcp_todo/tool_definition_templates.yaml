  description: 지정된 To Do 태스크를 삭제합니다.
  inputSchema:
    type: object
    properties:
      user_email:
        type: string
        description: 사용자 이메일 (생략 시 auth.db의 첫 사용자 사용)
        targetParam: user_email
      list_id_or_name:
        type: string
        description: 리스트 ID 또는 이름 (생략 시 defaultList 사용)
        targetParam: list_id_or_name
      task_id:
